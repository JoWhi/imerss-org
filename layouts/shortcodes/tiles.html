<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 p-8">
{{ range .Page.Site.RegularPages }}
  {{ if and (eq .Section "work") .Params.tile }}
    <a href="{{ .Params.link | default .Permalink }}" class="block p-4 border rounded-lg hover:shadow-lg">
      {{ with .Params.image }}
        <img src="{{ printf "work/%s" . | relURL }}" alt="{{ .Title }}" class="w-full h-48 object-cover rounded mb-4">
      {{ end }}
      <h3 class="text-xl font-bold mb-2">{{ .Title }}</h3>
      <p class="text-gray-600">{{ .Params.snippet }}</p>
    </a>
  {{ end }}
{{ end }}
</div>
